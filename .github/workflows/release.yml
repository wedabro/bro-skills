name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run tests
        run: pytest -q
      - name: Discord Notification
        if: always()
        run: |
          python -c "import urllib.request, json; req = urllib.request.Request('${{ secrets.DISCORD_WEBHOOK_URL }}', data=json.dumps({'content': '🧪 **Release Tests Status**: \`${{ job.status }}\` on tag \`${{ github.ref_name }}\`\nRepo: ${{ github.repository }}'}).encode('utf-8'), headers={'Content-Type': 'application/json', 'User-Agent': 'Mozilla/5.0'}); urllib.request.urlopen(req)"

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build artifacts
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes
      - name: Discord Notification
        if: always()
        run: |
          python -c "import urllib.request, json; req = urllib.request.Request('${{ secrets.DISCORD_WEBHOOK_URL }}', data=json.dumps({'content': '🎉 **New Release / Deploy**: \`${{ github.ref_name }}\` published successfully!\nRepo: ${{ github.repository }}\nStatus: \`${{ job.status }}\`'}).encode('utf-8'), headers={'Content-Type': 'application/json', 'User-Agent': 'Mozilla/5.0'}); urllib.request.urlopen(req)"
