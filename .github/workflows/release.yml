name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run tests
        run: pytest -q

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build artifacts in Docker
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work python:3.12-slim sh -lc "python -m pip install --upgrade pip; pip install build; python -m build"
      - name: Create GitHub Release in Docker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm -e GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" -v "${{ github.workspace }}:/work" -w /work ghcr.io/cli/cli:latest gh release create "${{ github.ref_name }}" dist/* --generate-notes
